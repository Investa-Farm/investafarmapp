services:
  - type: web
    name: investa-farm-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: bash build.sh
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      # ── Core ──────────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: BASE_PATH
        value: /

      # ── Database & Auth (set these in Render dashboard) ──────────────────────
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false

      # ── Admin (set these in Render dashboard) ────────────────────────────────
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # ── Email / SMTP (Gmail App Password) ────────────────────────────────────
      - key: GOOGLE_SMTP_USER
        sync: false
      - key: GOOGLE_SMTP_PASS
        sync: false

      # ── Payments ──────────────────────────────────────────────────────────────
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false

      # ── Web Push (VAPID) — public key is safe to hardcode ────────────────────
      - key: VAPID_PUBLIC_KEY
        value: BL36T426aOm-MLB77gGSDBvvsvAg679MLHt-dpmJ-SSNls6hqQA9AguxAhIwWmqbrPHsKnqQz8D9kVQaD5qZwfc
      - key: VAPID_PRIVATE_KEY
        sync: false

      # ── Stellar (blockchain custodial wallets) ────────────────────────────────
      - key: STELLAR_ISSUER_PUBLIC_KEY
        value: GDCTQTPZKLTNAXD6LM6AH3IZSJEV6BFB34XQCS4SHTLBN4YWKBIXK3ZJ
      - key: STELLAR_ISSUER_SECRET_KEY
        sync: false

      # ── AI ────────────────────────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false

      # ── News APIs (free-tier keys included; replace for production) ───────────
      - key: GNEWS_API_KEY
        value: f315af117cadae7bef4c9f1d4373a9bf
      - key: MEDIASTACK_API_KEY
        value: 1e30a1be82fd6cba322d03044bfa057d
      # Optional: higher-tier news sources
      - key: CURRENTS_API_KEY
        sync: false
      - key: THENEWSAPI_TOKEN
        sync: false

      # ── CORS (set to your Render app URL, e.g. https://investa-farm.onrender.com) ──
      - key: ALLOWED_ORIGINS
        sync: false
