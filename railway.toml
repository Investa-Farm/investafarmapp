[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node artifacts/api-server/dist/index.cjs"
healthcheckPath = "/api/market/summary"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[environment]
PORT = "8080"
NODE_ENV = "production"
