[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm --filter @workspace/db run push && BASE_PATH=/ pnpm --filter @workspace/investa-farm run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[environment]
PORT = "8080"
NODE_ENV = "production"
BASE_PATH = "/"
