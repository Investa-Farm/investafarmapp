openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Investa Farm API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: farms
    description: Farm management
  - name: market
    description: Market listings and trading
  - name: portfolio
    description: Investor portfolio
  - name: farmer
    description: Farmer dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /farms:
    get:
      operationId: listFarms
      tags: [farms]
      summary: List all farms
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: cropType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of farms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Farm"
    post:
      operationId: createFarm
      tags: [farms]
      summary: Create a farm (farmer only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFarmBody"
      responses:
        "201":
          description: Farm created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"

  /farms/{id}:
    get:
      operationId: getFarm
      tags: [farms]
      summary: Get farm by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Farm detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmDetail"
    patch:
      operationId: updateFarm
      tags: [farms]
      summary: Update farm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFarmBody"
      responses:
        "200":
          description: Updated farm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"

  /market/primary:
    get:
      operationId: listPrimaryMarket
      tags: [market]
      summary: List primary market offerings
      responses:
        "200":
          description: Primary market listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketListing"

  /market/secondary:
    get:
      operationId: listSecondaryMarket
      tags: [market]
      summary: List secondary market offerings
      responses:
        "200":
          description: Secondary market listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketListing"

  /market/movers:
    get:
      operationId: getTopMovers
      tags: [market]
      summary: Get top movers today
      responses:
        "200":
          description: Top movers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopMover"

  /market/summary:
    get:
      operationId: getMarketSummary
      tags: [market]
      summary: Get market summary stats
      responses:
        "200":
          description: Market summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSummary"

  /market/buy:
    post:
      operationId: buyShares
      tags: [market]
      summary: Buy shares (primary or secondary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuySharesBody"
      responses:
        "201":
          description: Purchase successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /market/sell:
    post:
      operationId: listSharesForSale
      tags: [market]
      summary: List investor shares on secondary market
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SellSharesBody"
      responses:
        "201":
          description: Listed for sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListing"

  /portfolio:
    get:
      operationId: getPortfolio
      tags: [portfolio]
      summary: Get investor portfolio
      responses:
        "200":
          description: Portfolio holdings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioHolding"

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [portfolio]
      summary: Get portfolio value summary
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"

  /portfolio/exit:
    post:
      operationId: requestExit
      tags: [portfolio]
      summary: Request exit from investment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExitRequestBody"
      responses:
        "200":
          description: Exit requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExitRequest"

  /transactions:
    get:
      operationId: listTransactions
      tags: [portfolio]
      summary: List transaction history
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /farmer/dashboard:
    get:
      operationId: getFarmerDashboard
      tags: [farmer]
      summary: Get farmer dashboard stats
      responses:
        "200":
          description: Farmer dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmerDashboard"

  /farmer/farms:
    get:
      operationId: getMyFarms
      tags: [farmer]
      summary: Get farmer's own farms
      responses:
        "200":
          description: Farmer's farms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Farm"

  /farmer/updates:
    get:
      operationId: listFarmUpdates
      tags: [farmer]
      summary: Get farm operation updates
      responses:
        "200":
          description: Farm updates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FarmUpdate"
    post:
      operationId: createFarmUpdate
      tags: [farmer]
      summary: Post a farm update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFarmUpdateBody"
      responses:
        "201":
          description: Update created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmUpdate"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [farmer, investor]
        createdAt:
          type: string
      required: [id, email, name, role, createdAt]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    RegisterBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [farmer, investor]
      required: [email, password, name, role]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    Farm:
      type: object
      properties:
        id:
          type: integer
        farmerId:
          type: integer
        farmerName:
          type: string
        name:
          type: string
        cropType:
          type: string
        location:
          type: string
        loanAmount:
          type: number
        totalShares:
          type: integer
        sharePrice:
          type: number
        sharesAvailable:
          type: integer
        fundingPercent:
          type: number
        status:
          type: string
          enum: [pending, active, funded, harvested]
        imageUrl:
          type: string
        changePercent:
          type: number
        tradeCount:
          type: integer
        currentPrice:
          type: number
        description:
          type: string
        createdAt:
          type: string
      required: [id, farmerId, farmerName, name, cropType, location, loanAmount, totalShares, sharePrice, sharesAvailable, fundingPercent, status, changePercent, tradeCount, currentPrice, createdAt]

    FarmDetail:
      allOf:
        - $ref: "#/components/schemas/Farm"
        - type: object
          properties:
            investors:
              type: integer
            priceHistory:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                  price:
                    type: number
                required: [date, price]
          required: [investors, priceHistory]

    CreateFarmBody:
      type: object
      properties:
        name:
          type: string
        cropType:
          type: string
        location:
          type: string
        loanAmount:
          type: number
        totalShares:
          type: integer
        description:
          type: string
        imageUrl:
          type: string
      required: [name, cropType, location, loanAmount, totalShares]

    UpdateFarmBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        status:
          type: string

    MarketListing:
      type: object
      properties:
        id:
          type: integer
        farmId:
          type: integer
        farmName:
          type: string
        cropType:
          type: string
        location:
          type: string
        listingType:
          type: string
          enum: [primary, secondary]
        sharesAvailable:
          type: integer
        pricePerShare:
          type: number
        changePercent:
          type: number
        tradeCount:
          type: integer
        imageUrl:
          type: string
        exitOptions:
          type: array
          items:
            type: string
        sellerName:
          type: string
        createdAt:
          type: string
      required: [id, farmId, farmName, cropType, location, listingType, sharesAvailable, pricePerShare, changePercent, tradeCount, createdAt]

    TopMover:
      type: object
      properties:
        farmId:
          type: integer
        farmName:
          type: string
        cropType:
          type: string
        currentPrice:
          type: number
        changePercent:
          type: number
        tradeCount:
          type: integer
        imageUrl:
          type: string
      required: [farmId, farmName, cropType, currentPrice, changePercent, tradeCount]

    MarketSummary:
      type: object
      properties:
        totalListings:
          type: integer
        primaryListings:
          type: integer
        secondaryListings:
          type: integer
        totalVolumeKes:
          type: number
        averageReturn:
          type: number
        topCrop:
          type: string
        cropBreakdown:
          type: array
          items:
            type: object
            properties:
              crop:
                type: string
              percent:
                type: number
              change:
                type: number
            required: [crop, percent, change]
      required: [totalListings, primaryListings, secondaryListings, totalVolumeKes, averageReturn, topCrop, cropBreakdown]

    BuySharesBody:
      type: object
      properties:
        listingId:
          type: integer
        quantity:
          type: integer
        exitType:
          type: string
          enum: [wide_season, full_season]
      required: [listingId, quantity, exitType]

    SellSharesBody:
      type: object
      properties:
        holdingId:
          type: integer
        quantity:
          type: integer
        pricePerShare:
          type: number
      required: [holdingId, quantity, pricePerShare]

    PortfolioHolding:
      type: object
      properties:
        id:
          type: integer
        farmId:
          type: integer
        farmName:
          type: string
        cropType:
          type: string
        location:
          type: string
        quantity:
          type: integer
        purchasePrice:
          type: number
        currentPrice:
          type: number
        totalValue:
          type: number
        gainLoss:
          type: number
        gainLossPercent:
          type: number
        exitType:
          type: string
        exitDate:
          type: string
        imageUrl:
          type: string
        status:
          type: string
      required: [id, farmId, farmName, cropType, location, quantity, purchasePrice, currentPrice, totalValue, gainLoss, gainLossPercent, exitType, status]

    PortfolioSummary:
      type: object
      properties:
        totalValue:
          type: number
        totalInvested:
          type: number
        todayReturn:
          type: number
        todayReturnPercent:
          type: number
        weekReturnPercent:
          type: number
        overallGainLoss:
          type: number
        overallGainLossPercent:
          type: number
        holdings:
          type: integer
        priceHistory:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              value:
                type: number
            required: [label, value]
      required: [totalValue, totalInvested, todayReturn, todayReturnPercent, weekReturnPercent, overallGainLoss, overallGainLossPercent, holdings, priceHistory]

    ExitRequestBody:
      type: object
      properties:
        holdingId:
          type: integer
        exitType:
          type: string
          enum: [wide_season, full_season]
      required: [holdingId, exitType]

    ExitRequest:
      type: object
      properties:
        id:
          type: integer
        holdingId:
          type: integer
        exitType:
          type: string
        exitDate:
          type: string
        estimatedReturn:
          type: number
        status:
          type: string
      required: [id, holdingId, exitType, exitDate, estimatedReturn, status]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [buy, sell, exit]
        farmId:
          type: integer
        farmName:
          type: string
        cropType:
          type: string
        quantity:
          type: integer
        pricePerShare:
          type: number
        totalAmount:
          type: number
        exitType:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required: [id, type, farmId, farmName, cropType, quantity, pricePerShare, totalAmount, status, createdAt]

    FarmerDashboard:
      type: object
      properties:
        farmValue:
          type: number
        weekChangePercent:
          type: number
        fundsRaised:
          type: number
        fundingTarget:
          type: number
        fundingPercent:
          type: number
        profit:
          type: number
        fundsReceived:
          type: number
        growthStage:
          type: string
          enum: [planting, growing, harvest]
        growthPercent:
          type: number
        activeFarms:
          type: integer
        totalInvestors:
          type: integer
        priceHistory:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              value:
                type: number
            required: [label, value]
      required: [farmValue, weekChangePercent, fundsRaised, fundingTarget, fundingPercent, profit, fundsReceived, growthStage, growthPercent, activeFarms, totalInvestors, priceHistory]

    FarmUpdate:
      type: object
      properties:
        id:
          type: integer
        farmId:
          type: integer
        farmName:
          type: string
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        hoursAgo:
          type: integer
        createdAt:
          type: string
      required: [id, farmId, farmName, title, description, hoursAgo, createdAt]

    CreateFarmUpdateBody:
      type: object
      properties:
        farmId:
          type: integer
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
      required: [farmId, title, description]
